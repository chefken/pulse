name: pulse
description: A discipline tracking app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animations
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  table_calendar: ^3.1.2

  # 🔔 Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # 🖼️ Local Images for Home Screen Rotation
  assets:
    - assets/images/